name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Bundle size budget
        run: pnpm size

      - name: Verify subpath exports
        run: pnpm check:exports

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the widget + host app so the Playwright webServer's turbo build is a cache hit
      # and `next start` serves the freshly built widget.
      - name: Build
        run: pnpm build

      - name: Install Playwright Chromium
        run: pnpm --filter @airnauts/airside-nextjs-host exec playwright install --with-deps chromium

      # Hermetic: no MONGODB_URI / BLOB_READ_WRITE_TOKEN in the env, so the host app falls
      # back to the in-memory repository + local public/uploads. A fresh runner means a cold
      # `next start` with no stale servers; Playwright's webServer manages start/stop.
      - name: Run e2e
        run: pnpm --filter @airnauts/airside-nextjs-host test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: examples/nextjs-host/playwright-report/
          retention-days: 7

  # Publish to npm on every push to main, but only after ci + e2e are green.
  # `changeset publish` is idempotent: it publishes only packages whose version is not
  # already on the registry, so a push without a version bump is a safe no-op. To release,
  # land a version bump on main (`pnpm version-packages`, see RELEASING.md).
  publish:
    needs: [ci, e2e]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the vX.Y.Z release tag
      id-token: write # npm provenance
    concurrency:
      group: npm-publish
      cancel-in-progress: false # never interrupt an in-flight publish
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Publishes the 13 public @airnauts/airside-* packages whose version isn't yet on npm.
      - name: Publish to npm
        run: pnpm exec changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Cut a single vX.Y.Z tag for the release. The 13 packages are a Changesets `fixed`
      # group, so they share one version — core is the canonical source. The tag-existence
      # check is the idempotency gate: this job runs on every push to main, but a version is
      # only tagged once (and only after the publish step above succeeded).
      - name: Tag release
        run: |
          V=$(node -p "require('./packages/core/package.json').version")
          TAG="v$V"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "$TAG already exists on origin — nothing to tag."
          else
            # Annotated tags need a committer identity; the runner has none by default.
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "Created and pushed $TAG."
          fi
