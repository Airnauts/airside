name: Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Self-contained gates: tag pushes do not trigger ci.yml (it only runs on
      # push:branches[main] + pull_request), so re-run the gates here before publishing.
      - name: Gate (lint, typecheck, build, test)
        run: pnpm lint && pnpm typecheck && pnpm build && pnpm test

      # Publishes only packages whose package.json version is not already on the registry.
      # Examples + test-support are in the Changesets `ignore` list, so they never publish.
      - name: Publish to npm
        run: pnpm exec changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
